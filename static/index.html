<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Local</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js pour le Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        #input::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
</head>
<body>
    <header class="bg-white border-b border-gray-200 p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">Agent Local</h1>
            <button onclick="toggleSettings()" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-600 hover:text-indigo-600 hover:bg-gray-100 rounded-lg transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                Paramètres
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-6">
        <div id="chat" class="chat-container overflow-y-auto space-y-6 pr-4" style="padding-bottom: 120px;">
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4">
        <div class="max-w-4xl mx-auto">
            <div class="flex gap-3">
                <textarea id="input" class="flex-1 border border-gray-300 rounded-3xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-base placeholder-gray-400 resize-none break-words" placeholder="Posez votre question ici..." rows="1" style="min-height: 56px; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;"></textarea>
                <button onclick="stopProcessing()" class="bg-red-600 hover:bg-red-700 w-8 h-8 rounded-3xl flex items-center justify-center text-white shadow-md transition-all mr-2" title="Arrêter le traitement">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <rect width="12" height="12" x="6" y="6" rx="2" />
                    </svg>
                </button>
                <button onclick="clearChat()" class="bg-gray-600 hover:bg-gray-700 w-8 h-8 rounded-3xl flex items-center justify-center text-white shadow-md transition-all mr-2" title="Effacer le chat">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
                <button onclick="send()" class="bg-indigo-600 hover:bg-indigo-700 w-14 h-14 rounded-3xl flex items-center justify-center text-white shadow-lg transition-all active:scale-95" title="Envoyer">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.874L5.999 12zm0 0h7.07" />
                    </svg>
                </button>
            </div>
            <p class="text-center text-[10px] text-gray-400 mt-3">Agent Local • Modèle <span id="current-model">qwen2.5-coder:3b</span></p>
        </div>
    </footer>

    <!-- Container pour la modal Paramètres -->
    <div id="settings-modal-container"></div>


    <script>
        // Configurer Marked pour permettre le HTML
        marked.setOptions({
            sanitize: false,
            breaks: true,
            gfm: true
        });
        
        const chat = document.getElementById("chat");
        const input = document.getElementById("input");
        
        // Vérifier que localStorage est disponible
        try {
            localStorage.setItem('test', 'test');
            localStorage.removeItem('test');
            console.log('localStorage est disponible');
        } catch (e) {
            console.error('localStorage n\'est pas disponible:', e);
        }

        function createMessageBubble(isUser = false, content = '') {
            const wrapper = document.createElement("div");
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-fade-in`;
            const bubble = document.createElement("div");
            bubble.className = `message-bubble ${isUser ? 'user-bubble' : 'ai-bubble'}`;
            if (content) {
                if (isUser) {
                    bubble.textContent = content;
                } else {
                    bubble.innerHTML = content;
                }
            }
            wrapper.appendChild(bubble);
            chat.appendChild(wrapper);
            return bubble;
        }

        function saveChat() {
            const messages = [];
            const wrappers = chat.querySelectorAll('.flex');
            console.log('Nombre de messages à sauvegarder:', wrappers.length);
            wrappers.forEach(wrapper => {
                const bubble = wrapper.querySelector('.message-bubble');
                if (bubble) {
                    const isUser = wrapper.classList.contains('justify-end');
                    const content = isUser ? bubble.textContent : bubble.innerHTML;
                    messages.push({ isUser, content });
                }
            });
            console.log('Messages à sauvegarder:', messages);
            
            // Sauvegarder sur le serveur
            try {
                fetch('/conversation/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: 'default',
                        messages: messages
                    })
                }).then(response => response.json())
                  .then(data => console.log('Chat sauvegardé sur le serveur:', data))
                  .catch(error => console.error('Erreur lors de la sauvegarde:', error));
            } catch (error) {
                console.error('Erreur lors de la sauvegarde du chat:', error);
            }
        }

        function loadChat() {
            // Charger la conversation depuis le serveur
            fetch('/conversation/load?session_id=default')
                .then(response => response.json())
                .then(data => {
                    console.log('Conversation chargée du serveur:', data);
                    const messages = data.messages || [];
                    if (messages.length > 0) {
                        messages.forEach(msg => {
                            createMessageBubble(msg.isUser, msg.content);
                        });
                    } else {
                        // Ajouter le message de bienvenue si aucun chat sauvegardé
                        const welcomeBubble = createMessageBubble(false);
                        welcomeBubble.innerHTML = marked.parse("👋 Bonjour ! Je suis **Agent Local**.\n\nJe peux discuter avec toi et exécuter du code Python pour obtenir des infos système, faire des calculs ou manipuler des données.\n\n<span class=\"text-sm text-gray-500\">Exemple : \"Quel est mon espace disque ?\" ou \"Calcule la racine carrée de 144\"</span>");
                        saveChat();
                    }
                })
                .catch(error => {
                    console.error('Erreur lors du chargement du chat:', error);
                    // Fallback: afficher le message de bienvenue
                    const welcomeBubble = createMessageBubble(false);
                    welcomeBubble.innerHTML = marked.parse("👋 Bonjour ! Je suis **Agent Local**.\n\nJe peux discuter avec toi et exécuter du code Python pour obtenir des infos système, faire des calculs ou manipuler des données.\n\n<span class=\"text-sm text-gray-500\">Exemple : \"Quel est mon espace disque ?\" ou \"Calcule la racine carrée de 144\"</span>");
                });
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;
            const userBubble = createMessageBubble(true);
            userBubble.textContent = text;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
            const aiBubble = createMessageBubble(false);
            let fullContent = "";
            let lastSseMessage = "";
            try {
                const requestBody = {
                    text: text,
                    session_id: "default",
                    model_name: currentSettings.model,
                    tools_config: {
                        executor_python: currentSettings.tools.executor_python
                    }
                };
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunkStr = decoder.decode(value, { stream: true });
                    const lines = chunkStr.split('\n');
                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                if (data.message) {
                                    const message = data.message.replace(/\r/g, "");
                                    if (!message) continue;
                                    if (message === lastSseMessage) continue;
                                    if (fullContent.endsWith(message)) continue;
                                    lastSseMessage = message;
                                    if (aiBubble.textContent.includes("Réflexion")) {
                                        aiBubble.innerHTML = "";
                                    }
                                    fullContent += message;
                                    aiBubble.innerHTML = marked.parse(fullContent);
                                    chat.scrollTop = chat.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }
                // Masquer les éléments de processus après un court délai
                setTimeout(() => {
                    const processes = aiBubble.querySelectorAll('.process');
                    processes.forEach(p => {
                        p.style.transition = 'opacity 0.5s ease-out';
                        p.style.opacity = '0';
                        setTimeout(() => p.remove(), 500);
                    });
                }, 1000); // Attendre 1 seconde avant de commencer à masquer
                console.log('Réponse complète reçue, sauvegarde du chat...');
                saveChat(); // Sauvegarder après la réponse complète
            } catch (error) {
                aiBubble.innerHTML = `<span class="text-red-500">Erreur de connexion au serveur.</span>`;
                console.log('Erreur lors de la réponse, sauvegarde du chat...');
                saveChat();
            }
        }

        async function stopProcessing() {
            try {
                await fetch('/stop', { method: 'POST' });
                const stopMsg = createMessageBubble(false);
                stopMsg.textContent = "[Processus arrêté]";
            } catch (e) {
                console.error('Failed to send stop request', e);
            }
        }

        async function clearChat() {
            chat.innerHTML = '';
            try {
                // Sauvegarder une conversation vide sur le serveur
                await fetch('/conversation/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: 'default',
                        messages: []
                    })
                });
                // Appeler le endpoint de clear du serveur
                await fetch('/clear', { method: 'POST' });
                console.log('Chat effacé');
            } catch (e) {
                console.error('Failed to clear conversation on server', e);
            }
        }

        if (input) {
            input.addEventListener("keydown", function(e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    send();
                }
            });
            
            // Ajuster la hauteur du textarea lors de la saisie
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
            });
        } else {
            console.error('Élément input non trouvé!');
        }

        let currentSettings = {
            model: 'qwen2.5-coder:3b',
            theme: 'light',
            tools: {
                executor_python: true,
                executor_cmd: true,
            }
        };

        async function loadSettings() {
            const saved = localStorage.getItem('agentSettings');
            if (saved) {
                currentSettings = JSON.parse(saved);
            }
            try {
                const response = await fetch('/settings');
                if (response.ok) {
                    const backendSettings = await response.json();
                    if (backendSettings.model_name) {
                        currentSettings.model = backendSettings.model_name;
                    }
                    if (backendSettings.enabled_tools) {
                        currentSettings.tools = {
                            executor_python: backendSettings.enabled_tools.executor_python ?? true,
                            executor_cmd: backendSettings.enabled_tools.executor_cmd ?? true,
                        };
                    }
                }
            } catch (error) {
                console.log('Impossible de charger les paramètres du backend, utilisation des paramètres locaux');
            }
            applySettings();
            // Charger la liste des modèles
            await loadModels();
        }

        async function loadModels() {
            try {
                const response = await fetch('/models');
                if (response.ok) {
                    const data = await response.json();
                    const modelSelect = document.getElementById('model-select');
                    if (modelSelect && data.models) {
                        // Vider le select
                        modelSelect.innerHTML = '';
                        // Ajouter les modèles
                        data.models.forEach(model => {
                            const option = document.createElement('option');
                            option.value = model;
                            option.textContent = model;
                            modelSelect.appendChild(option);
                        });
                        // Sélectionner le modèle actuel
                        modelSelect.value = currentSettings.model;
                    }
                } else {
                    console.error('Erreur lors du chargement des modèles:', data.error);
                }
            } catch (error) {
                console.error('Erreur lors du chargement des modèles:', error);
            }
        }

        function applySettings() {
            const modelSelect = document.getElementById('model-select');
            if (modelSelect) modelSelect.value = currentSettings.model;
            const currentModel = document.getElementById('current-model');
            if (currentModel) currentModel.textContent = currentSettings.model;
            setTheme(currentSettings.theme);
            const toolExecutor = document.getElementById('tool-executor');
            if (toolExecutor) toolExecutor.checked = currentSettings.tools.executor_python;
            const toolCmd = document.getElementById('tool-cmd');
            if (toolCmd) toolCmd.checked = currentSettings.tools.executor_cmd;
        }

        function setTheme(theme) {
            currentSettings.theme = theme;
            const body = document.body;
            const lightBtn = document.getElementById('theme-light');
            const darkBtn = document.getElementById('theme-dark');
            if (!lightBtn || !darkBtn) return; // Attendre que la modal soit chargée
            if (theme === 'dark') {
                body.classList.remove('bg-gray-50');
                body.classList.add('bg-gray-900');
                darkBtn.classList.remove('border-gray-300', 'bg-white', 'text-gray-700');
                darkBtn.classList.add('border-indigo-600', 'bg-indigo-900', 'text-indigo-100');
                lightBtn.classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
                lightBtn.classList.add('border-gray-300', 'bg-gray-800', 'text-gray-300');
            } else {
                body.classList.remove('bg-gray-900');
                body.classList.add('bg-gray-50');
                lightBtn.classList.remove('border-gray-300', 'bg-gray-800', 'text-gray-300');
                lightBtn.classList.add('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
                darkBtn.classList.remove('border-indigo-600', 'bg-indigo-900', 'text-indigo-100');
                darkBtn.classList.add('border-gray-300', 'bg-white', 'text-gray-700');
            }
        }

        async function saveSettings() {
            currentSettings.model = document.getElementById('model-select').value;
            document.getElementById('current-model').textContent = currentSettings.model;
            currentSettings.tools.executor_python = document.getElementById('tool-executor').checked;
            currentSettings.tools.executor_cmd = document.getElementById('tool-cmd')?.checked ?? currentSettings.tools.executor_cmd;
            localStorage.setItem('agentSettings', JSON.stringify(currentSettings));
            try {
                const response = await fetch('/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model_name: currentSettings.model,
                        enabled_tools: {
                            executor_python: currentSettings.tools.executor_python,
                            executor_cmd: currentSettings.tools.executor_cmd,
                        }
                    })
                });
                if (response.ok) {
                    showNotification('Paramètres enregistrés avec succès !');
                }
            } catch (e) {
                console.error('Erreur lors de l\'enregistrement des paramètres', e);
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-indigo-600 text-white px-4 py-2 rounded-lg shadow-lg';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
        }

        // Charger le chat immédiatement
        loadChat();

        // Charger la modal des paramètres après le chargement initial
        fetch('/static/settings-modal.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('settings-modal-container').innerHTML = html;
                loadSettings(); // Charger les paramètres après la modal
            })
            .catch(error => console.error('Erreur lors du chargement de la modal:', error));

        // Sauvegarder la conversation avant de quitter ou actualiser la page
        window.addEventListener('beforeunload', function() {
            saveChat();
        });
    </script>
</body>
</html>
